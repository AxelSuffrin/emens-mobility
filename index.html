<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>eMens Mobility</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 0 16px; }
    #result { margin-top: 20px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    .freshness { color: #666; font-size: 13px; }
    button { padding: 10px 16px; font-size: 15px; margin-right: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>eMens Mobility</h1>
  <button id="locate-velib-btn">Find nearest Vélib' station</button>
  <button id="locate-restaurant-btn">Find nearest restaurant</button>
  <button id="locate-cinema-btn">Find nearest cinema</button>
  <button id="locate-gym-btn">Find nearest gym</button>
  <button id="locate-bar-btn">Find nearest bar</button>
  <button id="locate-culture-btn">Find nearest culture site</button>

  <div id="result"></div>


  <script>
  const resultDiv = document.getElementById("result");


  function renderProvenance(provenance) {
    const freshness = provenance.freshness_seconds != null
      ? `updated ${provenance.freshness_seconds}s ago`
      : "no live timestamp";
    return `<p class="freshness">Source: ${provenance.source} · ${freshness} · confidence: ${provenance.confidence}</p>`;
  }


  function renderStation(station) {
    resultDiv.innerHTML = `
      <h2>${station.name}</h2>
      <p>${station.distance_meters} meters away</p>
      <p>🚲 ${station.state.mechanical_bikes} mechanical · ⚡ ${station.state.electric_bikes} electric · 🅿️ ${station.state.free_docks} free docks</p>
      ${renderProvenance(station.provenance)}
    `;
  }


  function renderRestaurant(restaurant) {
    const cuisine = restaurant.state.cuisine || "cuisine unknown";
    const address = restaurant.state.address || "address unknown";
    const hours = restaurant.state.opening_hours || "hours unknown";
    resultDiv.innerHTML = `
      <h2>${restaurant.name || "Unnamed restaurant"}</h2>
      <p>${restaurant.distance_meters} meters away</p>
      <p>🍽️ ${cuisine} · 📍 ${address}</p>
      <p>🕒 ${hours}</p>
      ${renderProvenance(restaurant.provenance)}
    `;
  }


  function renderCinema(cinema) {
    const operator = cinema.state.operator || "independent / operator unknown";
    const address = cinema.state.address || "address unknown";
    const screens = cinema.state.screens ? `${cinema.state.screens} screens` : "screen count unknown";
    const wheelchair = cinema.state.wheelchair || "accessibility unknown";
    resultDiv.innerHTML = `
      <h2>${cinema.name || "Unnamed cinema"}</h2>
      <p>${cinema.distance_meters} meters away</p>
      <p>🎬 ${operator} · 📍 ${address}</p>
      <p>🖥️ ${screens} · ♿ ${wheelchair}</p>
      ${renderProvenance(cinema.provenance)}
    `;
  }


  function renderGym(gym) {
    const operator = gym.state.operator || "independent / operator unknown";
    const address = gym.state.address || "address unknown";
    const hours = gym.state.opening_hours || "hours unknown";
    const fee = gym.state.fee || "fee info unknown";
    resultDiv.innerHTML = `
      <h2>${gym.name || "Unnamed gym"}</h2>
      <p>${gym.distance_meters} meters away</p>
      <p>💪 ${operator} · 📍 ${address}</p>
      <p>🕒 ${hours} · 💳 ${fee}</p>
      ${renderProvenance(gym.provenance)}
    `;
  }


  function renderBar(bar) {
    const address = bar.state.address || "address unknown";
    const hours = bar.state.opening_hours || "hours unknown";
    const liveMusic = bar.state.live_music === "yes"
      ? "live music 🎶"
      : bar.state.live_music === "no"
        ? "no live music"
        : "live music unknown";
    const outdoor = bar.state.outdoor_seating === "yes" ? "outdoor seating" : "seating unknown";
    resultDiv.innerHTML = `
      <h2>${bar.name || "Unnamed bar"}</h2>
      <p>${bar.distance_meters} meters away</p>
      <p>🍸 ${liveMusic} · 🪑 ${outdoor}</p>
      <p>📍 ${address} · 🕒 ${hours}</p>
      ${renderProvenance(bar.provenance)}
    `;
  }


  function renderCulture(site) {
    const category = site.state.category || "culture site";
    const address = site.state.address || "address unknown";
    const hours = site.state.opening_hours || "hours unknown";
    const fee = site.state.fee || "fee info unknown";
    const website = site.state.website
      ? `<a href="${site.state.website}" target="_blank">website</a>`
      : "no website listed";
    resultDiv.innerHTML = `
      <h2>${site.name || "Unnamed culture site"} (${category})</h2>
      <p>${site.distance_meters} meters away</p>
      <p>📍 ${address}</p>
      <p>🕒 ${hours} · 💳 ${fee}</p>
      <p>🔗 ${website}</p>
      ${renderProvenance(site.provenance)}
    `;
  }


  function locate(endpoint, loadingText, onSuccess, btn) {
    btn.disabled = true;
    resultDiv.textContent = "Locating you...";


    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;


        resultDiv.textContent = loadingText;


        try {
          const response = await fetch(`${endpoint}?lat=${lat}&lon=${lon}`);


          if (!response.ok) {
            throw new Error(`Server returned ${response.status}`);
          }


          const data = await response.json();
          onSuccess(data);
        } catch (error) {
          console.error("Fetch error:", error);
          resultDiv.textContent = "Couldn't reach the data. Please try again.";
        } finally {
          btn.disabled = false;
        }
      },
      (geoError) => {
        let message = "Could not get your location.";
        if (geoError.code === geoError.PERMISSION_DENIED) {
          message = "Location access denied. Enable it in your browser settings and try again.";
        } else if (geoError.code === geoError.TIMEOUT) {
          message = "Location request timed out. Try again.";
        } else if (geoError.code === geoError.POSITION_UNAVAILABLE) {
          message = "Location unavailable right now. Try again in a moment.";
        }
        resultDiv.textContent = message;
        btn.disabled = false;
      }
    );
  }


  document.getElementById("locate-velib-btn").addEventListener("click", (e) => {
    locate("/stations/nearest", "Fetching nearest station...", renderStation, e.target);
  });


  document.getElementById("locate-restaurant-btn").addEventListener("click", (e) => {
    locate("/restaurants/nearest", "Fetching nearest restaurant...", renderRestaurant, e.target);
  });


  document.getElementById("locate-cinema-btn").addEventListener("click", (e) => {
    locate("/cinemas/nearest", "Fetching nearest cinema...", renderCinema, e.target);
  });


  document.getElementById("locate-gym-btn").addEventListener("click", (e) => {
    locate("/gyms/nearest", "Fetching nearest gym...", renderGym, e.target);
  });


  document.getElementById("locate-bar-btn").addEventListener("click", (e) => {
    locate("/bars/nearest", "Fetching nearest bar...", renderBar, e.target);
  });


  document.getElementById("locate-culture-btn").addEventListener("click", (e) => {
    locate("/culture/nearest", "Fetching nearest culture site...", renderCulture, e.target);
  });
  </script>
</body>
</html>
